<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progreso del día</title>
  <link rel="stylesheet" href="../../shared/widget.css" />
</head>
<body>
  <div class="wrap">
    <div class="title" id="title"></div>
    <div class="bar" id="bar">
      <div class="fill" id="fill"></div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const title = "Progreso del día";
    const now = new Date();

    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);

    const msPerMinute = 60 * 1000;
    const elapsed = now - start;
    const total = end - start;
    const percent = (elapsed / total) * 100;

    const minutesLeft = Math.ceil((end - now) / msPerMinute);
    const hoursLeft = Math.floor(minutesLeft / 60);
    const remMinutes = Math.max(0, minutesLeft % 60);

    const titleEl = document.getElementById("title");
    const barEl = document.getElementById("bar");
    const fillEl = document.getElementById("fill");
    const metaEl = document.getElementById("meta");

    titleEl.textContent = title;
    fillEl.style.width = `${Math.max(0, Math.min(100, percent)).toFixed(2)}%`;
    metaEl.textContent = `${percent.toFixed(1)}% completado · Quedan ${hoursLeft}h ${remMinutes}m`;

    for (let i = 1; i < 24; i++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      if (i === 6 || i === 12 || i === 18) marker.classList.add("strong");
      marker.style.left = `${(i / 24) * 100}%`;
      barEl.appendChild(marker);
    }
  </script>
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript>
    <img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" />
  </noscript>
</body>
</html>
