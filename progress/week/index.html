<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progreso de la semana</title>
  <link rel="stylesheet" href="../../shared/widget.css" />
</head>
<body>
  <div class="wrap">
    <div class="title" id="title"></div>
    <div class="bar" id="bar">
      <div class="fill" id="fill"></div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const title = "Progreso de la semana";
    const now = new Date();

    const jsDay = now.getDay();
    const dayOffset = (jsDay + 6) % 7; // lunes=0

    const start = new Date(now);
    start.setHours(0, 0, 0, 0);
    start.setDate(start.getDate() - dayOffset);

    const end = new Date(start);
    end.setDate(end.getDate() + 7);

    const msPerDay = 24 * 60 * 60 * 1000;
    const elapsed = now - start;
    const total = end - start;
    const percent = (elapsed / total) * 100;

    const dayOfWeek = dayOffset + 1;
    const daysLeft = Math.max(0, Math.ceil((end - now) / msPerDay));

    const titleEl = document.getElementById("title");
    const barEl = document.getElementById("bar");
    const fillEl = document.getElementById("fill");
    const metaEl = document.getElementById("meta");

    titleEl.textContent = title;
    fillEl.style.width = `${Math.max(0, Math.min(100, percent)).toFixed(2)}%`;
    metaEl.textContent = `${percent.toFixed(1)}% completado · Día ${dayOfWeek}/7 · Quedan ${daysLeft} días`;

    for (let i = 1; i < 7; i++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      marker.style.left = `${(i / 7) * 100}%`;
      barEl.appendChild(marker);
    }
  </script>
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript>
    <img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" />
  </noscript>
</body>
</html>
