<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progreso del día</title>
  <style>
    :root {
      --text: #000;
      --track: #ecebe8;
      --fill: #68b984;
      --marker: rgba(0, 0, 0, 0.10);
      --marker-strong: rgba(0, 0, 0, 0.18);
    }
    body {
      margin: 0;
      padding: 10px 12px;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background: transparent;
    }
    .title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .bar {
      position: relative;
      width: 100%;
      height: 12px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: var(--fill);
      border-radius: 999px;
    }
    .marker {
      position: absolute;
      top: 0;
      width: 1px;
      height: 12px;
      background: var(--marker);
    }
    .marker.strong {
      background: var(--marker-strong);
    }
    .meta {
      margin-top: 8px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="title">Progreso del día</div>
  <div class="bar" id="bar">
    <div class="fill" id="fill"></div>
  </div>
  <div class="meta" id="meta"></div>

  <script>
    const now = new Date();
    const minutes = now.getHours() * 60 + now.getMinutes();
    const totalMinutes = 24 * 60;
    const percent = (minutes / totalMinutes) * 100;
    const minutesLeft = totalMinutes - minutes;
    const hoursLeft = Math.floor(minutesLeft / 60);
    const remMinutes = minutesLeft % 60;

    document.getElementById("fill").style.width = percent.toFixed(2) + "%";
    document.getElementById("meta").textContent =
      `${percent.toFixed(1)}% completado · Quedan ${hoursLeft}h ${remMinutes}m`;

    const bar = document.getElementById("bar");
    for (let i = 1; i < 24; i++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      if (i === 6 || i === 12 || i === 18) marker.classList.add("strong");
      marker.style.left = `${(i / 24) * 100}%`;
      bar.appendChild(marker);
    }
  </script>
</body>
</html>
