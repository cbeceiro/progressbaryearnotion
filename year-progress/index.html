<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progreso del año</title>
  <link rel="stylesheet" href="../shared/widget.css" />
</head>
<body>
  <div class="wrap">
    <div class="title" id="title"></div>
    <div class="bar" id="bar">
      <div class="fill" id="fill"></div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const title = "Progreso del año";
    const now = new Date();

    const year = now.getFullYear();
    const start = new Date(year, 0, 1, 0, 0, 0, 0);
    const end = new Date(year + 1, 0, 1, 0, 0, 0, 0);

    const msPerDay = 24 * 60 * 60 * 1000;
    const elapsed = now - start;
    const total = end - start;
    const percent = (elapsed / total) * 100;

    const totalDays = Math.round((end - start) / msPerDay);
    const dayOfYear = Math.floor((now - start) / msPerDay) + 1;
    const daysLeft = Math.max(0, Math.ceil((end - now) / msPerDay));

    const titleEl = document.getElementById("title");
    const barEl = document.getElementById("bar");
    const fillEl = document.getElementById("fill");
    const metaEl = document.getElementById("meta");

    titleEl.textContent = title;
    fillEl.style.width = `${Math.max(0, Math.min(100, percent)).toFixed(2)}%`;
    metaEl.textContent = `${percent.toFixed(1)}% completado · Día ${dayOfYear}/${totalDays} · Quedan ${daysLeft} días`;

    let accumulatedDays = 0;
    for (let month = 0; month < 12; month++) {
      if (month > 0) {
        const marker = document.createElement("div");
        marker.className = "marker";
        if (month === 3 || month === 6 || month === 9) marker.classList.add("strong");
        marker.style.left = `${(accumulatedDays / totalDays) * 100}%`;
        barEl.appendChild(marker);
      }

      const monthStart = new Date(year, month, 1);
      const nextMonthStart = new Date(year, month + 1, 1);
      accumulatedDays += Math.round((nextMonthStart - monthStart) / msPerDay);
    }
  </script>
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript>
    <img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" />
  </noscript>
</body>
</html>
