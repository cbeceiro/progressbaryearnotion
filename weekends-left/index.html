<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fines de semana restantes</title>
  <style>
    :root {
      --bg: transparent;
      --text: #000000;
      --muted: #666666;
      --track: #ecebe8;
      --fill: #68b984;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }
    body { padding: 10px 12px; }
    .big {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }
    .sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .bar {
      margin-top: 10px;
      width: 100%;
      height: 8px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      width: 0%;
      height: 100%;
      background: var(--fill);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="big" id="big"></div>
  <div class="sub" id="sub"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>

  <script>
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const year = now.getFullYear();
    const end = new Date(year + 1, 0, 1);

    let weekendsLeft = 0;
    let weekendsTotal = 0;

    for (let d = new Date(year, 0, 1); d < end; d.setDate(d.getDate() + 1)) {
      const isWeekend = d.getDay() === 0 || d.getDay() === 6;
      if (isWeekend) {
        weekendsTotal += 1;
        if (d >= todayStart) weekendsLeft += 1;
      }
    }

    const percentDone = ((weekendsTotal - weekendsLeft) / weekendsTotal) * 100;

    document.getElementById("big").textContent = `${weekendsLeft}`;
    document.getElementById("sub").textContent = `Fines de semana restantes este año`;
    document.getElementById("fill").style.width = `${Math.max(0, Math.min(100, percentDone)).toFixed(2)}%`;
  </script>
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript>
    <img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" />
  </noscript>
</body>
</html>
