<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta semana</title>
  <link rel="stylesheet" href="../shared/card.css" />
</head>
<body>
  <div class="title">Esta semana</div>
  <div class="percent" id="percent"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="meta" id="meta"></div>

  <script>
    const now = new Date();
    const jsDay = now.getDay();
    const dayOffset = (jsDay + 6) % 7;
    const start = new Date(now);
    start.setHours(0, 0, 0, 0);
    start.setDate(start.getDate() - dayOffset);
    const end = new Date(start);
    end.setDate(end.getDate() + 7);

    const percent = ((now - start) / (end - start)) * 100;
    const totalDays = 7;
    const dayInWeek = dayOffset + 1;
    const daysLeft = Math.max(0, Math.ceil((end - now) / (24 * 60 * 60 * 1000)));

    document.getElementById("percent").textContent = `${percent.toFixed(1)}%`;
    document.getElementById("fill").style.width = `${Math.max(0, Math.min(100, percent)).toFixed(2)}%`;
    document.getElementById("meta").textContent = `Día ${dayInWeek}/${totalDays} · Quedan ${daysLeft} días`;
  </script>
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript>
    <img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" />
  </noscript>
</body>
</html>
