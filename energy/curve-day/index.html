  <title>Curva diaria de energía | Notion Widgets</title>
  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: #666666;
      --line: #4fa36f;
      --fill: rgba(79, 163, 111, 0.16);
      --point: #2f7a50;
      --grid: rgba(0, 0, 0, 0.08);
      --morning: rgba(82, 168, 107, 0.10);
      --dip: rgba(232, 173, 96, 0.16);
      --evening: rgba(73, 156, 137, 0.12);
      --night: rgba(98, 126, 148, 0.12);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }

    body { padding: 8px 10px; }

    .title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .wrap {
      width: 100%;
      height: 140px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .meta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="title">Curva típica de energía/alerta diaria</div>
  <div class="desc">Referencia general basada en cronobiología humana (no medición clínica personalizada).</div>
  <div class="wrap"><canvas id="chart"></canvas></div>
  <div class="meta" id="meta"></div>

  <script>
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    const meta = document.getElementById("meta");

    function gaussian(x, mu, sigma) {
      const z = (x - mu) / sigma;
      return Math.exp(-0.5 * z * z);
    }

    function energyAtHour(hour) {
      const morningPeak = 0.38 * gaussian(hour, 10.2, 2.2);
      const lunchDip = -0.22 * gaussian(hour, 14.6, 1.5);
      const eveningPeak = 0.24 * gaussian(hour, 18.2, 2.0);
      const nightFall = 0.22 / (1 + Math.exp(-(hour - 21.0) * 2.2));
      const baseline = 0.43;

      const raw = baseline + morningPeak + lunchDip + eveningPeak - nightFall;
      return Math.max(0.06, Math.min(0.98, raw));
    }

    function currentHourDecimal(now) {
      return now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    }

    function hhmm(value) {
      const h = Math.floor(value);
      const m = Math.round((value - h) * 60);
      return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }

    function draw() {
      const ratio = window.devicePixelRatio || 1;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = Math.floor(w * ratio);
      canvas.height = Math.floor(h * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const padL = 8;
      const padR = 8;
      const padT = 8;
      const axisBand = 18;
      const padB = 8;
      const innerW = w - padL - padR;
      const innerH = h - padT - axisBand - padB;
      const axisY = padT + innerH;

      function xForHour(hour) {
        return padL + (hour / 24) * innerW;
      }

      function yForValue(value) {
        return padT + innerH - value * innerH;
      }

      ctx.clearRect(0, 0, w, h);

      // Colored momentum bands
      function paintBand(fromHour, toHour, cssVar) {
        const x0 = xForHour(fromHour);
        const x1 = xForHour(toHour);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim();
        ctx.fillRect(x0, padT, x1 - x0, innerH);
      }
      paintBand(6, 11, "--morning");
      paintBand(13, 16, "--dip");
      paintBand(17.5, 19.5, "--evening");
      paintBand(21, 24, "--night");

      // Axis and vertical guides every 6h
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid").trim();
      ctx.lineWidth = 1;
      [0, 6, 12, 18, 24].forEach((hour) => {
        const x = xForHour(hour);
        ctx.beginPath();
        ctx.moveTo(x, padT);
        ctx.lineTo(x, axisY);
        ctx.stroke();

        ctx.font = "10px Inter, Arial, sans-serif";
        ctx.fillStyle = "rgba(90,90,90,0.95)";
        ctx.textAlign = hour === 24 ? "right" : hour === 0 ? "left" : "center";
        ctx.textBaseline = "top";
        ctx.fillText(`${String(hour).padStart(2, "0")}:00`, x, axisY + 3);
      });

      // Momentum labels
      ctx.font = "10px Inter, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillStyle = "rgba(70,70,70,0.85)";
      ctx.fillText("Subida", xForHour(8.5), padT + 2);
      ctx.fillText("Dip", xForHour(14.5), padT + 2);
      ctx.fillText("Repunte", xForHour(18.5), padT + 2);
      ctx.fillText("Descenso", xForHour(22.5), padT + 2);

      // Fill under curve
      ctx.beginPath();
      for (let i = 0; i <= 240; i++) {
        const hour = (i / 240) * 24;
        const x = xForHour(hour);
        const y = yForValue(energyAtHour(hour));
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.lineTo(xForHour(24), axisY);
      ctx.lineTo(xForHour(0), axisY);
      ctx.closePath();
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--fill").trim();
      ctx.fill();

      // Main curve
      ctx.beginPath();
      for (let i = 0; i <= 240; i++) {
        const hour = (i / 240) * 24;
        const x = xForHour(hour);
        const y = yForValue(energyAtHour(hour));
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--line").trim();
      ctx.lineWidth = 2.2;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.stroke();

      // Current time point
      const now = new Date();
      const hourNow = currentHourDecimal(now);
      const xNow = xForHour(hourNow);
      const yNow = yForValue(energyAtHour(hourNow));

      ctx.beginPath();
      ctx.arc(xNow, yNow, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--point").trim();
      ctx.fill();

      ctx.beginPath();
      ctx.arc(xNow, yNow, 7.5, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(47, 122, 80, 0.22)";
      ctx.lineWidth = 2;
      ctx.stroke();

      const tag = `Ahora ${hhmm(hourNow)}`;
      ctx.font = "12px Inter, Arial, sans-serif";
      ctx.fillStyle = "rgba(17,17,17,0.9)";
      ctx.textBaseline = "middle";
      let tx = xNow + 10;
      let align = "left";
      const tw = ctx.measureText(tag).width;
      if (tx + tw > w - 4) {
        tx = xNow - 10;
        align = "right";
      }
      let ty = yNow - 10;
      if (ty < 10) ty = yNow + 12;
      ctx.textAlign = align;
      ctx.fillText(tag, tx, ty);

      meta.textContent = "Verde: subida matinal · Ámbar: dip de primera tarde · Verde azulado: repunte vespertino · Azul gris: descenso nocturno";
    }

    draw();
    window.addEventListener("resize", draw);
  </script>
</body>
