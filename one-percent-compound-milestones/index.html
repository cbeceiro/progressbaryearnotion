<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1% Better Compound Milestones</title>
  <style>
    :root {
      --bg: transparent;
      --text: #111111;
      --muted: #666666;
      --line: #68b984;
      --point: #2f7a50;
      --milestone: #c68a2f;
      --guide: rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }
    body { padding: 8px 10px; }
    .title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .desc { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.35; }
    .wrap { width: 100%; height: 94px; }
    canvas { width: 100%; height: 100%; display: block; }
    .labels {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }
    .labels div:nth-child(2) { text-align: right; }
  </style>
</head>
<body>
  <div class="title">1% Better Compound Milestones</div>
  <div class="desc">Curva anual con hitos x2, x5, x10 y x20, más el punto ideal de hoy.</div>
  <div class="wrap"><canvas id="chart"></canvas></div>
  <div class="labels">
    <div id="startLabel"></div>
    <div id="endLabel"></div>
  </div>

  <script>
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    const startLabel = document.getElementById("startLabel");
    const endLabel = document.getElementById("endLabel");

    function compoundFactor(days) { return Math.pow(1.01, days); }
    function formatTimes(factor) { return `x${factor.toFixed(2)} mejor`; }

    function getYearData(now) {
      const year = now.getFullYear();
      const start = new Date(year, 0, 1, 0, 0, 0, 0);
      const end = new Date(year + 1, 0, 1, 0, 0, 0, 0);
      const msPerDay = 24 * 60 * 60 * 1000;
      const totalDays = Math.round((end - start) / msPerDay);
      const dayIndex = Math.min(totalDays, Math.max(1, Math.floor((now - start) / msPerDay) + 1));
      return { year, totalDays, dayIndex };
    }

    function daysForTarget(multiplier) {
      return Math.log(multiplier) / Math.log(1.01);
    }

    function draw() {
      const ratio = window.devicePixelRatio || 1;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = Math.floor(w * ratio);
      canvas.height = Math.floor(h * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const padX = 6;
      const padY = 8;
      const innerW = w - padX * 2;
      const innerH = h - padY * 2;

      const now = new Date();
      const data = getYearData(now);
      const yMin = compoundFactor(0);
      const yMax = compoundFactor(data.totalDays);
      const yRange = yMax - yMin;

      function xForDay(d) { return padX + (d / data.totalDays) * innerW; }
      function yForDay(d) {
        const t = (compoundFactor(d) - yMin) / yRange;
        return padY + innerH - t * innerH;
      }

      ctx.clearRect(0, 0, w, h);

      ctx.beginPath();
      ctx.moveTo(padX, padY + innerH);
      ctx.lineTo(padX + innerW, padY + innerH);
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--guide").trim();
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      for (let d = 0; d <= data.totalDays; d++) {
        const x = xForDay(d);
        const y = yForDay(d);
        if (d === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--line").trim();
      ctx.lineWidth = 2;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.stroke();

      const milestones = [2, 5, 10, 20];
      ctx.font = "10px Inter, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      milestones.forEach((m) => {
        const day = daysForTarget(m);
        if (day > data.totalDays) return;
        const x = xForDay(day);
        const y = yForDay(day);

        ctx.beginPath();
        ctx.moveTo(x, y + 6);
        ctx.lineTo(x, padY + innerH);
        ctx.strokeStyle = "rgba(198, 138, 47, 0.22)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y, 3.4, 0, Math.PI * 2);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--milestone").trim();
        ctx.fill();

        ctx.fillStyle = "rgba(120, 80, 20, 0.9)";
        ctx.fillText(`x${m}`, x, y - 5);
      });

      const px = xForDay(data.dayIndex);
      const py = yForDay(data.dayIndex);
      ctx.beginPath();
      ctx.arc(px, py, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--point").trim();
      ctx.fill();

      ctx.beginPath();
      ctx.arc(px, py, 7.5, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(47, 122, 80, 0.25)";
      ctx.lineWidth = 2;
      ctx.stroke();

      const todayText = `Hoy: ${formatTimes(compoundFactor(data.dayIndex))}`;
      ctx.font = "13px Inter, Arial, sans-serif";
      ctx.fillStyle = "rgba(17, 17, 17, 0.9)";
      ctx.textBaseline = "middle";
      let textX = px + 10;
      let align = "left";
      const textWidth = ctx.measureText(todayText).width;
      if (textX + textWidth > w - 4) {
        textX = px - 10;
        align = "right";
      }
      let textY = py - 10;
      if (textY < 10) textY = py + 12;
      ctx.textAlign = align;
      ctx.fillText(todayText, textX, textY);

      startLabel.textContent = `1 de Enero de ${data.year}: 0% mejor`;
      endLabel.textContent = `31 de Diciembre de ${data.year}: ${formatTimes(compoundFactor(data.totalDays))}`;
    }

    draw();
    window.addEventListener("resize", draw);
  </script>
</body>
</html>
