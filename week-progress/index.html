<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progreso de la semana</title>
  <style>
    :root {
      --text: #000;
      --track: #ecebe8;
      --fill: #68b984;
      --marker: rgba(0, 0, 0, 0.12);
    }
    body {
      margin: 0;
      padding: 10px 12px;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background: transparent;
    }
    .title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .bar {
      position: relative;
      width: 100%;
      height: 12px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: var(--fill);
      border-radius: 999px;
    }
    .marker {
      position: absolute;
      top: 0;
      width: 1px;
      height: 12px;
      background: var(--marker);
    }
    .meta {
      margin-top: 8px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="title">Progreso de la semana</div>
  <div class="bar" id="bar">
    <div class="fill" id="fill"></div>
  </div>
  <div class="meta" id="meta"></div>

  <script>
    const now = new Date();
    const jsDay = now.getDay();
    const dayOfWeek = jsDay === 0 ? 7 : jsDay; // lunes=1 ... domingo=7
    const percent = (dayOfWeek / 7) * 100;
    const daysLeft = 7 - dayOfWeek;

    document.getElementById("fill").style.width = percent.toFixed(2) + "%";
    document.getElementById("meta").textContent =
      `${percent.toFixed(1)}% completado · Día ${dayOfWeek}/7 · Quedan ${daysLeft} días`;

    const bar = document.getElementById("bar");
    for (let i = 1; i < 7; i++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      marker.style.left = `${(i / 7) * 100}%`;
      bar.appendChild(marker);
    }
  </script>
</body>
</html>
