<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Día en horas</title>
  <link rel="stylesheet" href="../../shared/widget.css" />
</head>
<body>
  <div class="wrap">
    <div class="title" id="title"></div>
    <div class="bar" id="bar">
      <div class="fill" id="fill"></div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);

    const elapsedHours = (now - start) / (60 * 60 * 1000);
    const totalHours = 24;
    const hoursLeft = Math.max(0, totalHours - elapsedHours);
    const percent = (elapsedHours / totalHours) * 100;

    document.getElementById("title").textContent = "Día en horas";
    document.getElementById("fill").style.width = `${Math.max(0, Math.min(100, percent)).toFixed(2)}%`;
    document.getElementById("meta").textContent = `${Math.floor(elapsedHours)}/${totalHours} horas · Quedan ${Math.ceil(hoursLeft)}`;

    const barEl = document.getElementById("bar");
    for (let i = 1; i < 24; i++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      if (i === 6 || i === 12 || i === 18) marker.classList.add("strong");
      marker.style.left = `${(i / 24) * 100}%`;
      barEl.appendChild(marker);
    }
  </script>
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript>
    <img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" />
  </noscript>
</body>
</html>
