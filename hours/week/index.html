<head>

  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

  <meta name="twitter:card" content="summary" />

  <!-- /SEO -->
  <title>Semana en horas | Notion Widgets</title>
  <link rel="stylesheet" href="../../shared/widget.css" />
</head>
<body>
  <div class="wrap">
    <div class="title" id="title"></div>
    <div class="bar" id="bar">
      <div class="fill" id="fill"></div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const now = new Date();
    const jsDay = now.getDay();
    const dayOffset = (jsDay + 6) % 7;

    const start = new Date(now);
    start.setHours(0, 0, 0, 0);
    start.setDate(start.getDate() - dayOffset);

    const end = new Date(start);
    end.setDate(end.getDate() + 7);

    const elapsedHours = (now - start) / (60 * 60 * 1000);
    const totalHours = 7 * 24;
    const hoursLeft = Math.max(0, totalHours - elapsedHours);
    const percent = (elapsedHours / totalHours) * 100;

    document.getElementById("title").textContent = "Semana en horas";
    document.getElementById("fill").style.width = `${Math.max(0, Math.min(100, percent)).toFixed(2)}%`;
    document.getElementById("meta").textContent = `${Math.floor(elapsedHours)}/${totalHours} horas · Quedan ${Math.ceil(hoursLeft)}`;

    const barEl = document.getElementById("bar");
    for (let i = 1; i < 7; i++) {
      const marker = document.createElement("div");
      marker.className = "marker";
      marker.style.left = `${(i / 7) * 100}%`;
      barEl.appendChild(marker);
    }
  </script>
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript>
    <img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" />
  </noscript>
</body>
</html>
