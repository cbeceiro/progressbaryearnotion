<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progreso del año</title>
  <style>
    :root {
      --bg: transparent;
      --text: #37352f;
      --muted: #787774;
      --track: #ecebe8;
      --fill-1: #b7d4c0;
      --fill-2: #9fc5ac;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    body {
      padding: 10px 12px;
    }

    .wrap {
      width: 100%;
      max-width: none;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--muted);
    }

    .bar {
      width: 100%;
      height: 12px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--fill-1), var(--fill-2));
      transition: width 0.8s ease;
    }

    .meta {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Progreso del año</div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div class="meta" id="meta"></div>
  </div>

  <script>
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 1);
    const end = new Date(now.getFullYear() + 1, 0, 1);

    const elapsed = now - start;
    const total = end - start;
    const percent = (elapsed / total) * 100;

    const msPerDay = 1000 * 60 * 60 * 24;
    const dayOfYear = Math.floor((now - start) / msPerDay) + 1;
    const totalDays = Math.floor((end - start) / msPerDay);
    const daysLeft = totalDays - dayOfYear;

    document.getElementById("fill").style.width = percent.toFixed(2) + "%";
    document.getElementById("meta").textContent =
      `${percent.toFixed(1)}% completado · ${dayOfYear}/${totalDays} días · Quedan ${daysLeft} días`;
  </script>
</body>
</html>
